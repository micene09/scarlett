name: build

on:
  release:
    types: [created]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js v25.x
        uses: actions/setup-node@v3
        with:
          node-version: '25.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run build-types
      - run: npm run build-es6