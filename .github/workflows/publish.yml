name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      name:
        description: 'reason'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js v25.x
        uses: actions/setup-node@v3
        with:
          node-version: '25.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run build
      - run: npm run build-types
      - run: npm run build-es6
      - run: npm test
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}